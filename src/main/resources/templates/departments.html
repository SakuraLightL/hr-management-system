<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>部署管理</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
        }

        .sidebar {
            min-height: 100vh;
            background: #212529;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 10px 12px;
            display: block;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #343a40;
            color: #fff;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <aside class="col-md-2 sidebar p-3">
            <h4 class="text-white mb-4">
                HR System
            </h4>

            <a href="/dashboard">
                一覧
            </a>

            <a href="/employees">
                社員管理
            </a>

            <a class="active" href="/departments">
                部署管理
            </a>

            <a href="/users"
               sec:authorize="hasRole('ADMIN')">
                ユーザー管理
            </a>
        </aside>

        <main class="col-md-10 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1">
                        部署管理
                    </h2>

                    <div class="text-muted">
                        Department Management
                    </div>
                </div>

                <div>
                    <span class="me-3 text-muted"
                          th:if="${loginUser != null}">
                        ログイン中：
                        <span th:text="${loginUser}"></span>
                    </span>

                    <a href="/departments/new"
                       class="btn btn-primary">
                        New Department
                    </a>

                    <a href="/logout"
                       class="btn btn-outline-secondary ms-2">
                        Logout
                    </a>
                </div>
            </div>

            <div class="card shadow-sm">

                <div class="card-header bg-white fw-bold">
                    部署一覧
                </div>

                <div class="card-body">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle mb-0">

                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>部署名</th>
                                <th>説明</th>
                                <th class="text-end">操作</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="dept : ${departments}">
                                <td th:text="${dept.id}"></td>
                                <td th:text="${dept.name}"></td>
                                <td th:text="${dept.description}"></td>

                                <td class="text-end">
                                    <a th:href="@{/departments/edit/{id}(id=${dept.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        Edit
                                    </a>

                                    <a th:href="@{/departments/delete/{id}(id=${dept.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('削除しますか？')">
                                        Delete
                                    </a>
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(departments)}">
                                <td colspan="4"
                                    class="text-center text-muted py-4">
                                    部署データがありません
                                </td>
                            </tr>
                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </main>

    </div>
</div>

</body>
</html>
