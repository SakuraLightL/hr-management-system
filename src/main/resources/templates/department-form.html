<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Department Form</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
        }

        .sidebar {
            min-height: 100vh;
            background: #212529;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 10px 12px;
            display: block;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #343a40;
            color: #fff;
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <aside class="col-md-2 sidebar p-3">

            <h4 class="text-white mb-4">
                HR System
            </h4>

            <a href="/dashboard">
                一覧
            </a>

            <a href="/employees">
                社員管理
            </a>

            <a class="active" href="/departments">
                部署管理
            </a>

            <a href="/users"
               sec:authorize="hasAuthority('ROLE_ADMIN')">
                ユーザー管理
            </a>

        </aside>

        <!-- Main -->
        <main class="col-md-10 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h2 class="mb-1">
                        Department Form
                    </h2>

                    <div class="text-muted">
                        Department Management
                    </div>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="text-muted">
                        ログイン中：
                        <span th:text="${loginUser}">User</span>
                    </div>

                    <a href="/logout"
                       class="btn btn-outline-secondary btn-sm">
                        Logout
                    </a>
                </div>

            </div>

            <!-- Form Card -->
            <div class="card shadow-sm">

                <div class="card-header bg-white fw-bold">
                    部署登録・編集
                </div>

                <div class="card-body">

                    <form th:action="@{/departments/save}"
                          th:object="${department}"
                          method="post">

                        <input type="hidden"
                               th:field="*{id}">

                        <!-- Department Name -->
                        <div class="mb-3">

                            <label class="form-label">
                                部署名
                            </label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="部署名を入力"
                                   required>

                        </div>

                        <!-- Description -->
                        <div class="mb-4">

                            <label class="form-label">
                                説明
                            </label>

                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="4"
                                      placeholder="説明を入力"></textarea>

                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-primary">
                                Save
                            </button>

                            <a href="/departments"
                               class="btn btn-outline-secondary">
                                Back
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </main>

    </div>

</div>

</body>
</html>
