<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Employees</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <style>
    body {
      background-color: #f5f6f8;
    }

    .sidebar {
      min-height: 100vh;
      background: #212529;
    }

    .sidebar a {
      color: #adb5bd;
      text-decoration: none;
      padding: 10px 12px;
      display: block;
      border-radius: 6px;
      margin-bottom: 4px;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: #343a40;
      color: #fff;
    }

    .error {
      color: #dc3545;
      font-size: 12px;
      margin-top: 4px;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.6);
      display: none;
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .custom-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      display: none;
      z-index: 3000;
      min-width: 220px;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <aside class="col-md-2 sidebar p-3">
      <h4 class="text-white mb-4">HR System</h4>

      <a class="active" href="/employees">社員管理</a>
      <a href="/departments">部署管理</a>
      <a href="/users">ユーザー管理</a>
    </aside>

    <!-- Main -->
    <main class="col-md-10 p-4">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="mb-1">社員管理</h2>
          <div class="text-muted">Employee Management</div>
        </div>
      </div>

      <!-- Search Card -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-4">
              <label for="searchName" class="form-label">名前検索</label>
              <input type="text"
                     id="searchName"
                     class="form-control"
                     placeholder="例：田中">
            </div>

            <div class="col-md-auto">
              <button type="button"
                      class="btn btn-primary"
                      onclick="searchEmployees(0)">
                検索
              </button>
            </div>

            <div class="col-md-auto">
              <button type="button"
                      class="btn btn-outline-secondary"
                      onclick="clearSearch()">
                クリア
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Table Card -->
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-bold">
          社員一覧
        </div>

        <div class="card-body">
          <div class="table-responsive">
            <table id="employeeTable"
                   class="table table-hover align-middle mb-0">
            </table>
          </div>

          <div id="pagination" class="mt-3"></div>
        </div>
      </div>

      <!-- Form Card -->
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">
          <span id="formTitle">New Employee</span>
        </div>

        <div class="card-body">
          <form id="employeeForm">
            <input type="hidden" id="id">

            <div class="row g-3">

              <div class="col-md-6">
                <label for="name" class="form-label">名前</label>
                <input type="text" id="name" class="form-control">
                <div id="nameError" class="error"></div>
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label">メール</label>
                <input type="text" id="email" class="form-control">
                <div id="emailError" class="error"></div>
              </div>

              <div class="col-md-6">
                <label for="position" class="form-label">役職</label>
                <input type="text" id="position" class="form-control">
                <div id="positionError" class="error"></div>
              </div>

              <div class="col-md-6">
                <label for="departmentId" class="form-label">部署</label>
                <select id="departmentId" class="form-select">
                  <option value="">選択してください</option>
                  <option value="1">営業</option>
                  <option value="2">開発部</option>
                  <option value="3">人事</option>
                </select>
                <div id="departmentIdError" class="error"></div>
              </div>

            </div>

            <div id="globalError" class="error mt-3"></div>

            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                保存
              </button>

              <button type="button"
                      class="btn btn-outline-secondary"
                      onclick="resetForm()">
                キャンセル
              </button>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<!-- Toast -->
<div id="toast" class="alert alert-dark custom-toast"></div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    await loadDepartments();
    await loadEmployees();
  });

  function showLoading(flag) {
    const loading = document.getElementById("loading");
    loading.style.display = flag ? "flex" : "none";
  }

  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 2000);
  }

  function clearErrors() {
    ["name", "email", "position", "departmentId"].forEach(field => {
      const element = document.getElementById(field + "Error");
      if (element) element.textContent = "";
    });

    document.getElementById("globalError").textContent = "";
  }

  function renderEmployees(employees) {
    const table = document.getElementById("employeeTable");

    let html = `
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>名前</th>
          <th>メール</th>
          <th>役職</th>
          <th>部署</th>
          <th class="text-end">操作</th>
        </tr>
      </thead>
      <tbody>
    `;

    employees.forEach(emp => {
      html += `
        <tr>
          <td>${emp.id ?? ""}</td>
          <td>${emp.name ?? ""}</td>
          <td>${emp.email ?? ""}</td>
          <td>${emp.position ?? ""}</td>
          <td>${emp.departmentName ?? ""}</td>
          <td class="text-end">
            <button type="button"
                    class="btn btn-sm btn-outline-primary"
                    onclick="editEmployee(${emp.id})">
              編集
            </button>

            <button type="button"
                    class="btn btn-sm btn-outline-danger"
                    onclick="deleteEmployee(${emp.id})">
              削除
            </button>
          </td>
        </tr>
      `;
    });

    html += `</tbody>`;
    table.innerHTML = html;
  }

  async function loadEmployees() {
    try {
      showLoading(true);

      const res = await fetch("/api/employees/search?page=0&size=10&sort=id,desc");
      const result = await res.json();

      renderEmployees(result.data.content || []);
      renderPagination(result.data);

    } catch (e) {
      showToast("一覧取得失敗");
    } finally {
      showLoading(false);
    }
  }

  async function searchEmployees(page = 0) {
    try {
      showLoading(true);

      const name = document.getElementById("searchName").value;

      const url =
        `/api/employees/search?name=${encodeURIComponent(name)}&page=${page}&size=10&sort=id,desc`;

      const res = await fetch(url);
      const result = await res.json();

      renderEmployees(result.data.content || []);
      renderPagination(result.data);

    } catch (e) {
      showToast("検索失敗");
    } finally {
      showLoading(false);
    }
  }

  function renderPagination(pageData) {
    const area = document.getElementById("pagination");
    area.innerHTML = "";

    if (!pageData || pageData.totalPages <= 1) return;

    for (let i = 0; i < pageData.totalPages; i++) {
      const button = document.createElement("button");

      button.textContent = i + 1;
      button.type = "button";
      button.className = "btn btn-sm me-1 " +
        (i === pageData.number ? "btn-primary" : "btn-outline-primary");

      button.onclick = () => searchEmployees(i);

      if (i === pageData.number) {
        button.disabled = true;
      }

      area.appendChild(button);
    }
  }

  function clearSearch() {
    document.getElementById("searchName").value = "";
    loadEmployees();
  }

  document.getElementById("employeeForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    clearErrors();
    showLoading(true);

    const id = document.getElementById("id").value;

    const data = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      position: document.getElementById("position").value,
      departmentId: document.getElementById("departmentId").value
        ? Number(document.getElementById("departmentId").value)
        : null
    };

    const url = id ? `/api/employees/${id}` : "/api/employees";
    const method = id ? "PUT" : "POST";

    try {
      const res = await fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (result.status === "success") {
        showToast(result.message || "保存成功");
        resetForm();
        reloadCurrentList();
        return;
      }

      if (result.status === "error") {
        showFieldErrors(result.data || {});
        return;
      }

      showToast("保存失敗");

    } catch (err) {
      showToast("通信エラー");
    } finally {
      showLoading(false);
    }
  });

  function showFieldErrors(errors) {
    Object.keys(errors).forEach(field => {
      const errorElement = document.getElementById(field + "Error");
      if (errorElement) {
        errorElement.textContent = errors[field];
      }
    });
  }

  async function editEmployee(id) {
    try {
      showLoading(true);

      const res = await fetch(`/api/employees/${id}`);
      const result = await res.json();

      const emp = result.data;

      if (!emp) {
        showToast("データが見つかりません");
        return;
      }

      document.getElementById("formTitle").textContent = "Edit Employee";

      document.getElementById("id").value = emp.id ?? "";
      document.getElementById("name").value = emp.name ?? "";
      document.getElementById("email").value = emp.email ?? "";
      document.getElementById("position").value = emp.position ?? "";
      document.getElementById("departmentId").value = emp.departmentId ?? "";

      clearErrors();

      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });

    } catch (e) {
      showToast("取得失敗");
    } finally {
      showLoading(false);
    }
  }

  async function deleteEmployee(id) {
    if (!confirm("削除しますか？")) return;

    try {
      showLoading(true);

      const res = await fetch(`/api/employees/${id}`, {
        method: "DELETE"
      });

      if (!res.ok) {
        showToast("削除失敗");
        return;
      }

      showToast("削除成功");
      reloadCurrentList();

    } catch (e) {
      showToast("通信エラー");
    } finally {
      showLoading(false);
    }
  }

  function resetForm() {
    document.getElementById("formTitle").textContent = "New Employee";

    document.getElementById("id").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("position").value = "";
    document.getElementById("departmentId").value = "";

    clearErrors();
  }

  function reloadCurrentList() {
    const searchName = document.getElementById("searchName").value;

    if (searchName) {
      searchEmployees(0);
    } else {
      loadEmployees();
    }
  }

  async function loadDepartments() {
    try {
      const res = await fetch("/api/departments");
      const result = await res.json();

      const select = document.getElementById("departmentId");

      select.innerHTML = `<option value="">選択してください</option>`;

      const departments = result.data || [];

      departments.forEach(dept => {
        const option = document.createElement("option");
        option.value = dept.id;
        option.textContent = dept.name;
        select.appendChild(option);
      });

    } catch (e) {
      showToast("部署一覧取得失敗");
    }
  }
</script>

</body>
</html>
