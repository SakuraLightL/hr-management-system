<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">

    <title>一覧</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f5f6f8;
        }

        .sidebar {
            min-height: 100vh;
        }

        .nav-link {
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .nav-link:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .dashboard-card {
            border: none;
            border-radius: 14px;
        }

        .dashboard-number {
            font-size: 36px;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <aside class="col-md-2 bg-dark text-white sidebar p-3">

            <h4 class="mb-4">
                HR System
            </h4>

            <nav class="nav flex-column">

                <a class="nav-link text-white"
                   href="/dashboard">

                    一覧

                </a>

                <a class="nav-link text-white"
                   href="/employees">

                    社員管理

                </a>

                <a class="nav-link text-white"
                   href="/departments">

                    部署管理

                </a>

                <a class="nav-link text-white"
                   href="/users"
                   sec:authorize="hasRole('ADMIN')">

                    ユーザー管理

                </a>

            </nav>

        </aside>

        <!-- Main -->
        <main class="col-md-10 p-4">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="mb-1">
                        Dashboard
                    </h2>

                    <div class="text-muted">

                        ログイン中：
                        <span th:text="${loginUser}">
                            User
                        </span>

                    </div>

                </div>

                <div class="text-end">

                    <div class="small text-muted mb-2">

                        権限：
                        <span sec:authentication="authorities"></span>

                    </div>

                    <a href="/logout"
                       class="btn btn-outline-secondary btn-sm">

                        Logout

                    </a>

                </div>

            </div>

            <!-- Cards -->
            <div class="row g-4">

                <!-- Employee -->
                <div class="col-md-4">

                    <div class="card shadow-sm dashboard-card">

                        <div class="card-body">

                            <div class="text-muted mb-2">
                                社員数
                            </div>

                            <div class="dashboard-number"
                                 th:text="${employeeCount}">

                                0

                            </div>

                        </div>

                    </div>

                </div>

                <!-- Department -->
                <div class="col-md-4">

                    <div class="card shadow-sm dashboard-card">

                        <div class="card-body">

                            <div class="text-muted mb-2">
                                部署数
                            </div>

                            <div class="dashboard-number"
                                 th:text="${departmentCount}">

                                0

                            </div>

                        </div>

                    </div>

                </div>

                <!-- User -->
                <div class="col-md-4">

                    <div class="card shadow-sm dashboard-card">

                        <div class="card-body">

                            <div class="text-muted mb-2">
                                ユーザー数
                            </div>

                            <div class="dashboard-number"
                                 th:text="${userCount}">

                                0

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </main>

    </div>

</div>

</body>

</html>
