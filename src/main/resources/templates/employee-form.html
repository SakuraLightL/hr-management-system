<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>社員登録・編集</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow-sm mx-auto" style="max-width: 700px;">
    <div class="card-body p-4">

      <h2 class="mb-4">社員登録・編集</h2>

      <form id="employeeForm">

        <input type="hidden"
               id="id"
               th:value="${employee.id}">

        <div class="mb-3">
          <label for="name" class="form-label">名前</label>
          <input type="text"
                 id="name"
                 class="form-control"
                 th:value="${employee.name}">
          <div id="nameError" class="text-danger small mt-1"></div>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">メールアドレス</label>
          <input type="text"
                 id="email"
                 class="form-control"
                 th:value="${employee.email}">
          <div id="emailError" class="text-danger small mt-1"></div>
        </div>

        <div class="mb-3">
          <label for="position" class="form-label">役職</label>
          <input type="text"
                 id="position"
                 class="form-control"
                 th:value="${employee.position}">
          <div id="positionError" class="text-danger small mt-1"></div>
        </div>

        <div class="mb-4">
          <label for="departmentId" class="form-label">部署</label>

          <select id="departmentId" class="form-select">
            <option value="">選択してください</option>

            <option th:each="dept : ${departments}"
                    th:value="${dept.id}"
                    th:text="${dept.name}"
                    th:selected="${employee.departmentId == dept.id}">
            </option>
          </select>

          <div id="departmentIdError" class="text-danger small mt-1"></div>
        </div>

        <div id="globalMessage" class="mb-3"></div>

        <div class="d-flex justify-content-between">
          <a href="/employees" class="btn btn-outline-secondary">
            戻る
          </a>

          <button type="submit" class="btn btn-primary">
            保存
          </button>
        </div>

      </form>

    </div>
  </div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {

      const form = document.getElementById("employeeForm");

      form.addEventListener("submit", async function(e) {

          e.preventDefault();

          clearMessages();

          const idValue =
              document.getElementById("id").value;

          const departmentIdValue =
              document.getElementById("departmentId").value;

          const data = {
              id: idValue ? Number(idValue) : null,
              name: document.getElementById("name").value,
              email: document.getElementById("email").value,
              position: document.getElementById("position").value,
              departmentId: departmentIdValue
                  ? Number(departmentIdValue)
                  : null
          };

          const url = idValue
              ? `/api/employees/${idValue}`
              : "/api/employees";

          const method = idValue
              ? "PUT"
              : "POST";

          try {

              const res = await fetch(url, {
                  method: method,
                  headers: {
                      "Content-Type": "application/json"
                  },
                  body: JSON.stringify(data)
              });

              const result = await res.json();

              if (res.ok) {
                  showGlobalMessage("保存しました", "success");

                  setTimeout(() => {
                      window.location.href = "/employees";
                  }, 800);

                  return;
              }

              if (res.status === 400) {

                  const errors = result.data
                      ? result.data
                      : result;

                  Object.keys(errors).forEach(field => {
                      const el =
                          document.getElementById(field + "Error");

                      if (el) {
                          el.textContent = errors[field];
                      }
                  });

                  showGlobalMessage(
                      "入力内容を確認してください",
                      "danger"
                  );

                  return;
              }

              showGlobalMessage(
                  "サーバーエラーが発生しました",
                  "danger"
              );

          } catch (err) {

              showGlobalMessage(
                  "通信エラーです",
                  "danger"
              );

              console.error(err);
          }
      });
  });

  function clearMessages() {

      ["name", "email", "position", "departmentId"]
          .forEach(field => {

              const el =
                  document.getElementById(field + "Error");

              if (el) {
                  el.textContent = "";
              }
          });

      const global =
          document.getElementById("globalMessage");

      global.textContent = "";
      global.className = "";
  }

  function showGlobalMessage(message, type) {

      const global =
          document.getElementById("globalMessage");

      global.textContent = message;
      global.className = `alert alert-${type}`;
  }
</script>

</body>
</html>
