<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <style>

    body {
        background-color: #f5f6f8;
    }

    .login-wrapper {
        min-height: 100vh;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        border: none;
        border-radius: 12px;
    }

    .logo-area {
        text-align: center;
        margin-bottom: 24px;
    }

    .logo-title {
        font-size: 28px;
        font-weight: bold;
        color: #212529;
    }

    .logo-sub {
        color: #6c757d;
        font-size: 14px;
    }

  </style>

</head>

<body>

<div class="container">

  <div class="row justify-content-center align-items-center login-wrapper">

    <div class="col-auto">

      <div class="logo-area">
        <div class="logo-title">
          HR System
        </div>

        <div class="logo-sub">
          Employee Management System
        </div>
      </div>

      <div class="card shadow-sm login-card">

        <div class="card-body p-4">

          <h3 class="mb-4 text-center">
            Login
          </h3>

          <form th:action="@{/login}"
                method="post">

            <!-- Error Message -->
            <div th:if="${param.error}"
                 class="alert alert-danger">

              ユーザー名またはパスワードが違います

            </div>

            <!-- Logout Message -->
            <div th:if="${param.logout}"
                 class="alert alert-success">

              ログアウトしました

            </div>

            <!-- Username -->
            <div class="mb-3">

              <label class="form-label">
                Username
              </label>

              <input type="text"
                     name="username"
                     class="form-control"
                     placeholder="Enter username"
                     required>

            </div>

            <!-- Password -->
            <div class="mb-4">

              <label class="form-label">
                Password
              </label>

              <input type="password"
                     name="password"
                     class="form-control"
                     placeholder="Enter password"
                     required>

            </div>

            <!-- Button -->
            <div class="d-grid">

              <button type="submit"
                      class="btn btn-primary">

                Login

              </button>

            </div>

          </form>

        </div>

      </div>

      <div class="text-center mt-3 text-muted small">
        © HR System
      </div>

    </div>

  </div>

</div>

</body>
</html>
