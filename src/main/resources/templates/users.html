<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>ユーザー管理</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <style>

    body {
        background-color: #f5f6f8;
    }

    .sidebar {
        min-height: 100vh;
        background: #212529;
    }

    .sidebar a {
        color: #adb5bd;
        text-decoration: none;
        padding: 10px 12px;
        display: block;
        border-radius: 6px;
        margin-bottom: 4px;
    }

    .sidebar a:hover,
    .sidebar a.active {
        background: #343a40;
        color: #fff;
    }

  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <aside class="col-md-2 sidebar p-3">

      <h4 class="text-white mb-4">
        HR System
      </h4>

      <a href="/dashboard">
        一覧
      </a>

      <a href="/employees">
        社員管理
      </a>

      <a href="/departments">
        部署管理
      </a>

      <a class="active"
         href="/users"
         sec:authorize="hasRole('ADMIN')">
        ユーザー管理
      </a>

    </aside>

    <!-- Main -->
    <main class="col-md-10 p-4">

      <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
          <h2 class="mb-1">
            ユーザー管理
          </h2>

          <div class="text-muted">
            User Management
          </div>
        </div>

        <div>

                    <span class="me-3 text-muted"
                          th:if="${loginUser != null}">

                        ログイン中：
                        <span th:text="${loginUser}"></span>

                    </span>

          <a href="/users/new"
             class="btn btn-primary">
            New User
          </a>

          <a href="/logout"
             class="btn btn-outline-secondary ms-2">
            Logout
          </a>

        </div>

      </div>

      <div class="card shadow-sm">

        <div class="card-header bg-white fw-bold">
          ユーザー一覧
        </div>

        <div class="card-body">

          <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

              <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Provider</th>
                <th>Role</th>
                <th class="text-end">Action</th>
              </tr>
              </thead>

              <tbody>

              <tr th:each="user : ${users}">

                <td th:text="${user.id}"></td>

                <td th:text="${user.username}"></td>

                <td th:text="${user.email}"></td>

                <td>

                                    <span th:if="${user.provider == 'GOOGLE'}"
                                          class="badge text-bg-danger">
                                        GOOGLE
                                    </span>

                  <span th:if="${user.provider == 'LOCAL'}"
                        class="badge text-bg-dark">
                                        LOCAL
                                    </span>

                </td>

                <td>

                                    <span th:if="${user.role == 'ADMIN'}"
                                          class="badge text-bg-primary">
                                        ADMIN
                                    </span>

                  <span th:if="${user.role == 'USER'}"
                        class="badge text-bg-secondary">
                                        USER
                                    </span>

                </td>

                <td class="text-end">

                  <a th:href="@{/users/edit/{id}(id=${user.id})}"
                     class="btn btn-sm btn-outline-primary">
                    Edit
                  </a>

                  <a th:href="@{/users/delete/{id}(id=${user.id})}"
                     class="btn btn-sm btn-outline-danger"
                     onclick="return confirm('削除しますか？')">
                    Delete
                  </a>

                </td>

              </tr>

              <tr th:if="${#lists.isEmpty(users)}">

                <td colspan="6"
                    class="text-center text-muted py-4">

                  ユーザーが登録されていません

                </td>

              </tr>

              </tbody>

            </table>

          </div>

        </div>

      </div>

    </main>

  </div>
</div>

</body>
</html>
