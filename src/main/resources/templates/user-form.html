<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>User Form</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <style>

    body {
        background-color: #f5f6f8;
    }

    .sidebar {
        min-height: 100vh;
        background: #212529;
    }

    .sidebar a {
        color: #adb5bd;
        text-decoration: none;
        padding: 10px 12px;
        display: block;
        border-radius: 6px;
        margin-bottom: 4px;
    }

    .sidebar a:hover,
    .sidebar a.active {
        background: #343a40;
        color: #fff;
    }

  </style>

</head>

<body>

<div class="container-fluid">

  <div class="row">

    <!-- Sidebar -->
    <aside class="col-md-2 sidebar p-3">

      <h4 class="text-white mb-4">
        HR System
      </h4>

      <a href="/employees">
        社員管理
      </a>

      <a href="/departments">
        部署管理
      </a>

      <a class="active" href="/users">
        ユーザー管理
      </a>

    </aside>

    <!-- Main -->
    <main class="col-md-10 p-4">

      <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

          <h2 class="mb-1">
            User Form
          </h2>

          <div class="text-muted">
            User Management
          </div>

        </div>

      </div>

      <div class="card shadow-sm">

        <div class="card-header bg-white fw-bold">

          ユーザー登録・編集

        </div>

        <div class="card-body">

          <form th:action="@{/users/save}"
                th:object="${user}"
                method="post">

            <input type="hidden"
                   th:field="*{id}">

            <!-- Username -->
            <div class="mb-3">

              <label class="form-label">
                Username
              </label>

              <input type="text"
                     th:field="*{username}"
                     class="form-control"
                     placeholder="Enter username">

            </div>

            <!-- Password -->
            <div class="mb-3">

              <label class="form-label">
                Password
              </label>

              <input type="password"
                     th:field="*{password}"
                     class="form-control"
                     placeholder="Enter password">

            </div>

            <!-- Role -->
            <div class="mb-4">

              <label class="form-label">
                Role
              </label>

              <select th:field="*{role}"
                      class="form-select">

                <option value="ADMIN">
                  ADMIN
                </option>

                <option value="USER">
                  USER
                </option>

              </select>

            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">

              <button type="submit"
                      class="btn btn-primary">

                Save

              </button>

              <a href="/users"
                 class="btn btn-outline-secondary">

                Back

              </a>

            </div>

          </form>

        </div>

      </div>

    </main>

  </div>

</div>

</body>
</html>
